name: Run Tests

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main, booking-sys]

jobs:
  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Run frontend tests
        run: npx vitest run --coverage

  backend-tests:
    name: Backend Tests (Jest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "src/appointment booking/package-lock.json"

      - name: Install backend dependencies
        run: npm ci
        working-directory: "src/appointment booking"

      - name: Run backend tests
        run: npm test
        working-directory: "src/appointment booking"