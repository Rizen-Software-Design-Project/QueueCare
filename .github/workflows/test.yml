name: Login and Create account frontend tests

on:
  push:
    branches: [ tests ]
  pull_request:
    branches: [ tests ]
  workflow_dispatch:  # Allows manual trigger

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install  # Changed from npm ci to avoid lock file issues

      - name: Run tests with coverage
        run: npm run coverage:all
        env:
          CI: true
      
      - name: Upload test coverage (optional)
        uses: actions/upload-artifact@v4
        if: always()  # Upload even if tests fail
        with:
          name: coverage-report
          path: coverage/  # If your tests generate a coverage folder
