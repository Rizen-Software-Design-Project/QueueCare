name: Run Tests

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main, booking-sys]

permissions:
  contents: write

jobs:
  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm install

      - name: Run frontend tests with coverage
        run: npx vitest run --coverage 2>&1 | tee vitest-output.txt

      - name: Generate coverage badge
        if: github.event_name == 'push'
        run: |
          COVERAGE=$(node -e "const c = JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json', 'utf8')); console.log(c.total.statements.pct)")
          if (( $(echo "$COVERAGE >= 80" | bc -l) )); then COLOR=brightgreen
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then COLOR=yellow
          else COLOR=red; fi
          curl -s -o coverage-badge.svg "https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR}"

      - name: Commit coverage badge
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coverage-badge.svg
          git diff --cached --quiet || (git commit -m "Update coverage badge [skip ci]" && git push)

      - name: Coverage summary
        if: always()
        run: |
          echo "## Frontend Coverage (Vitest)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "%|File|All files|---" vitest-output.txt | head -30 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          grep "Test Files" vitest-output.txt >> $GITHUB_STEP_SUMMARY || true
          grep "Tests " vitest-output.txt >> $GITHUB_STEP_SUMMARY || true

  backend-tests:
    name: Backend Tests (Jest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: "src/appointment booking/package-lock.json"

      - name: Install backend dependencies
        run: npm install
        working-directory: "src/appointment booking"

      - name: Run backend tests with coverage
        run: |
          npm test 2>&1 | tee jest-output.txt
          echo "## Backend Coverage (Jest)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -A 20 "^-.*-$" jest-output.txt | head -25 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          grep "Test Suites" jest-output.txt >> $GITHUB_STEP_SUMMARY
          grep "Tests:" jest-output.txt >> $GITHUB_STEP_SUMMARY
        working-directory: "src/appointment booking"