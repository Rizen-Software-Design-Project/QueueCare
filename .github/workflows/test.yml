name: Run Tests

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main, booking-sys]

jobs:
  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm install

      - name: Run frontend tests with coverage
        run: |
          npx vitest run --coverage 2>&1 | tee vitest-output.txt
          echo "## Frontend Coverage (Vitest)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -A 100 "Coverage report" vitest-output.txt | head -30 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          grep "Test Files" vitest-output.txt >> $GITHUB_STEP_SUMMARY
          grep "Tests " vitest-output.txt >> $GITHUB_STEP_SUMMARY

  backend-tests:
    name: Backend Tests (Jest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: "src/appointment booking/package-lock.json"

      - name: Install backend dependencies
        run: npm install
        working-directory: "src/appointment booking"

      - name: Run backend tests with coverage
        run: |
          npm test 2>&1 | tee jest-output.txt
          echo "## Backend Coverage (Jest)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -A 20 "^-.*-$" jest-output.txt | head -25 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          grep "Test Suites" jest-output.txt >> $GITHUB_STEP_SUMMARY
          grep "Tests:" jest-output.txt >> $GITHUB_STEP_SUMMARY
        working-directory: "src/appointment booking"