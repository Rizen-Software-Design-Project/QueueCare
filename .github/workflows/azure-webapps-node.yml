name: Build and deploy Node.js app to Azure Web App

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: QueueCare
  AZURE_RESOURCE_GROUP: QueueCare-rg
  NODE_VERSION: '20.x'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install backend dependencies
        working-directory: "src/appointment booking"
        run: npm ci --omit=dev

      - name: Prepare deployment package
        run: |
          # Create deployment directory
          mkdir -p deploy/server
          
          # Copy built frontend
          cp -r dist deploy/dist
          
          # Copy ALL backend files from src/appointment booking
          cp -r "src/appointment booking"/* deploy/server/
          
          # Copy any additional backend files if they exist at root level
          cp -r routes deploy/server/routes 2>/dev/null || true
          cp -r middleware deploy/server/middleware 2>/dev/null || true
          cp server.js deploy/server.js 2>/dev/null || true
          cp app.js deploy/app.js 2>/dev/null || true
          
          # Copy configuration files
          cp package.json deploy/ 2>/dev/null || true
          cp deploy-web.config deploy/web.config 2>/dev/null || true
          cp deploy-entry.js deploy/server.js 2>/dev/null || true
          
          # Add deployment timestamp
          echo "// deployed $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> deploy/server.js
          
          # List deployment contents for debugging
          echo "Deployment package contents:"
          ls -la deploy/
          ls -la deploy/server/

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: deploy/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app
          path: .

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: .

      - name: Restart App Service
        run: az webapp restart --name $AZURE_WEBAPP_NAME --resource-group $AZURE_RESOURCE_GROUP
