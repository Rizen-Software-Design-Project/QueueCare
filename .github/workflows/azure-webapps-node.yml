name: Build and deploy Node.js app to Azure Web App

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: QueueCare
  NODE_VERSION: '20.x'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install backend dependencies
        working-directory: src/appointment booking
        run: npm ci --omit=dev

      - name: Prepare deployment package
        run: |
          mkdir deploy
          cp -r dist deploy/dist
          cp -r "src/appointment booking" deploy/server
          cp package.json deploy/
          cp deploy-web.config deploy/web.config
          cp deploy-entry.js deploy/server.js
          echo "// deployed $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> deploy/server.js

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: deploy/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: QueueCare

      - name: Restart App Service
        run: az webapp restart --name QueueCare --resource-group $(az webapp show --name QueueCare --query resourceGroup -o tsv)
