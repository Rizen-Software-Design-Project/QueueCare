name: Build and deploy Node.js app to Azure Web App

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: QueueCare
  AZURE_RESOURCE_GROUP: QueueCare-rg
  NODE_VERSION: '20.x'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # CLEAN INSTALL (no cache issues)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # CLEAN PACKAGE (THIS FIXES YOUR ERROR)
      - name: Create clean deployment package
        run: |
          mkdir deploy

          # backend only essentials
          cp server.js deploy/
          cp package.json deploy/
          cp package-lock.json deploy/
          cp -r src deploy/

          # frontend build output
          cp -r dist deploy/

          echo "Clean deploy contents:"
          ls -la deploy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app
          path: .

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # IMPORTANT FIX: deploy ONLY clean folder
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: deploy

      - name: Restart App Service
        run: az webapp restart --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }}
